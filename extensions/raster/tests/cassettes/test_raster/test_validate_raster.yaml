        \     ]\n    },\n    \"raster:scale\": {\n      \"title\": \"multiplicator
        factor of the pixel value to transform into the value\",\n      \"type\":
        \"number\"\n    },\n    \"raster:offset\": {\n      \"title\": \"number to
        be added to the pixel value to transform into the value\",\n      \"type\":
        \"number\"\n    },\n    \"raster:spatial_resolution\": {\n      \"title\":
