        \"number\"\n        },\n        \"min\": {\n          \"title\": \"Minimum
        value of the buckets\",\n          \"type\": \"number\"\n        },\n        \"max\":
        {\n          \"title\": \"Maximum value of the buckets\",\n          \"type\":
        \"number\"\n        },\n        \"buckets\": {\n          \"title\": \"distribution
        buckets\",\n          \"type\": \"array\",\n          \"minItems\": 3,\n          \"items\":
        {\n            \"title\": \"number of pixels in the bucket\",\n            \"type\":
        \"integer\"\n          }\n        }\n      }\n    }\n  }\n}\n"
