        \"distribution buckets\",\n                \"type\": \"array\",\n                \"minItems\":
        3,\n                \"items\": {\n                  \"title\": \"number of
        pixels in the bucket\",\n                  \"type\": \"integer\"\n                }\n
        \             }\n            }\n          }\n        }\n      }\n    }\n  }\n}\n"
