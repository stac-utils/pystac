        \"Band\",\n        \"type\": \"object\",\n        \"minProperties\": 1,\n
        \       \"additionalProperties\": true,\n        \"properties\": {\n          \"data_type\":
        {\n            \"title\": \"Data type of the band\",\n            \"type\":
        \"string\",\n            \"enum\": [\n              \"int8\",\n              \"int16\",\n
