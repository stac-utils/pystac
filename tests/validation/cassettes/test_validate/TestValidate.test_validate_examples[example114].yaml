    body:
      string: "{\n  \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n  \"$id\":
        \"https://schemas.stacspec.org/v1.0.0-rc.1/extensions/view/json-schema/schema.json#\",\n
        \ \"title\": \"View Geometry Extension\",\n  \"description\": \"STAC View
        Geometry Extension for STAC Items and STAC Collections.\",\n  \"oneOf\": [\n
        \   {\n      \"$comment\": \"This is the schema for STAC Items.\",\n      \"allOf\":
        [\n        {\n          \"type\": \"object\",\n          \"required\": [\n
        \           \"type\",\n            \"properties\",\n            \"assets\"\n
        \         ],\n          \"properties\": {\n            \"type\": {\n              \"const\":
        \"Feature\"\n            },\n            \"properties\": {\n              \"allOf\":
        [\n                {\n                  \"anyOf\": [\n                    {\"required\":
        [\"view:off_nadir\"]},\n                    {\"required\": [\"view:incidence_angle\"]},\n
        \                   {\"required\": [\"view:azimuth\"]},\n                    {\"required\":
        [\"view:sun_azimuth\"]},\n                    {\"required\": [\"view:sun_elevation\"]}\n
        \                 ]\n                },\n                {\n                  \"$ref\":
        \"#/definitions/fields\"\n                }\n              ]\n            },\n
        \           \"assets\": {\n              \"type\": \"object\",\n              \"additionalProperties\":
        {\n                \"$ref\": \"#/definitions/fields\"\n              }\n            }\n
        \         }\n        },\n        {\n          \"$ref\": \"#/definitions/stac_extensions\"\n
        \       }\n      ]\n    },\n    {\n      \"$comment\": \"This is the schema
        for STAC Collections.\",\n      \"allOf\": [\n        {\n          \"type\":
        \"object\",\n          \"required\": [\n            \"type\"\n          ],\n
        \         \"properties\": {\n            \"type\": {\n              \"const\":
        \"Collection\"\n            },\n            \"assets\": {\n              \"type\":
        \"object\",\n              \"additionalProperties\": {\n                \"$ref\":
        \"#/definitions/fields\"\n              }\n            },\n            \"item_assets\":
        {\n              \"type\": \"object\",\n              \"additionalProperties\":
        {\n                \"$ref\": \"#/definitions/fields\"\n              }\n            }\n
        \         }\n        }\n      ]\n    }\n  ],\n  \"definitions\": {\n    \"stac_extensions\":
        {\n      \"type\": \"object\",\n      \"required\": [\n        \"stac_extensions\"\n
        \     ],\n      \"properties\": {\n        \"stac_extensions\": {\n          \"type\":
        \"array\",\n          \"contains\": {\n            \"enum\": [\n              \"view\",\n
        \             \"https://schemas.stacspec.org/v1.0.0-rc.1/extensions/view/json-schema/schema.json\"\n
        \           ]\n          }\n        }\n      }\n    },\n    \"fields\": {\n
        \     \"$comment\": \"Add your new fields here. Don't require them here, do
        that above in the item schema.\",\n      \"type\": \"object\",\n      \"properties\":
        {\n        \"view:off_nadir\": {\n          \"title\": \"Off Nadir\",\n          \"type\":
        \"number\",\n          \"minimum\": 0,\n          \"maximum\": 90\n        },\n
        \       \"view:incidence_angle\": {\n          \"title\": \"Center incidence
        angle\",\n          \"type\": \"number\",\n          \"minimum\": 0,\n          \"maximum\":
        90\n        },\n        \"view:azimuth\": {\n          \"title\": \"Azimuth
        angle\",\n          \"type\": \"number\",\n          \"minimum\": 0,\n          \"maximum\":
        360\n        },\n        \"view:sun_azimuth\": {\n          \"title\": \"Sun
        Azimuth\",\n          \"type\": \"number\",\n          \"minimum\": 0,\n          \"maximum\":
        360\n        },\n        \"view:sun_elevation\": {\n          \"title\": \"Sun
        Elevation\",\n          \"type\": \"number\",\n          \"minimum\": -90,\n
        \         \"maximum\": 90\n        }\n      },\n      \"patternProperties\":
        {\n        \"^(?!view:)\": {}\n      },\n      \"additionalProperties\": false\n
        \   }\n  }\n}"
