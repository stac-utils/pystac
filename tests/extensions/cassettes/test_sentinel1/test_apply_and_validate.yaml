interactions:
- request:
    body: null
    headers: {}
    method: GET
    uri: https://stac-extensions.github.io/sentinel-1/v0.2.0/schema.json
  response:
    body:
      string: "{\n  \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n  \"$id\":
        \"https://stac-extensions.github.io/sentinel-1/v0.2.0/schema.json#\",\n  \"title\":
        \"Sentinel-1 Extension\",\n  \"description\": \"STAC Sentinel-1 Extension
        for STAC Items and STAC Collection Summaries.\",\n  \"type\": \"object\",\n
        \ \"required\": [\n    \"stac_extensions\"\n  ],\n  \"properties\": {\n    \"stac_extensions\":
        {\n      \"type\": \"array\",\n      \"contains\": {\n        \"const\": \"https://stac-extensions.github.io/sentinel-1/v0.2.0/schema.json\"\n
        \     }\n    }\n  },\n  \"oneOf\": [\n    {\n      \"$comment\": \"This is
        the schema for STAC Items.\",\n      \"type\": \"object\",\n      \"required\":
        [\n        \"type\",\n        \"properties\"\n      ],\n      \"properties\":
        {\n        \"type\": {\n          \"const\": \"Feature\"\n        },\n        \"properties\":
        {\n          \"allOf\": [\n            {\n              \"$ref\": \"#/definitions/require_any\"\n
        \           },\n            {\n              \"$ref\": \"#/definitions/fields\"\n
        \           }\n          ]\n        }\n      }\n    },\n    {\n      \"$comment\":
        \"This is the schema for STAC Collections, or more specifically only Collection
        Summaries in this case. By default, only checks the existence of the properties,
        but not the schema of the summaries.\",\n      \"type\": \"object\",\n      \"required\":
        [\n        \"type\",\n        \"summaries\"\n      ],\n      \"properties\":
        {\n        \"type\": {\n          \"const\": \"Collection\"\n        },\n
        \       \"summaries\": {\n          \"$ref\": \"#/definitions/require_any\"\n
        \       }\n      }\n    }\n  ],\n  \"definitions\": {\n    \"require_any\":
        {\n      \"$comment\": \"Please list all fields here so that we can force
        the existence of one of them in other parts of the schemas.\",\n      \"anyOf\":
        [\n        {\"required\": [\"s1:datatake_id\"]},\n        {\"required\": [\"s1:instrument_configuration_ID\"]},\n
        \       {\"required\": [\"s1:orbit_source\"]},\n        {\"required\": [\"s1:slice_number\"]},\n
        \       {\"required\": [\"s1:total_slices\"]}\n      ]\n    },\n    \"fields\":
        {\n      \"$comment\": \" Don't require fields here, do that above in the
        corresponding schema.\",\n      \"type\": \"object\",\n      \"properties\":
        {\n        \"s1:datatake_id\": {\n          \"type\": \"string\"\n        },\n
        \       \"s1:instrument_configuration_ID\": {\n          \"type\": \"string\"\n
        \       },\n        \"s1:orbit_source\": {\n          \"type\": \"string\"\n
        \       },\n        \"s1:processing_datetime\": {\n          \"type\": \"string\",\n
        \         \"format\": \"date-time\"\n        },\n        \"s1:product_identifier\":
        {\n          \"type\": \"string\"\n        },\n        \"s1:product_timeliness\":
        {\n          \"type\": \"string\"\n        },\n        \"s1:resolution\":
        {\n          \"type\": \"string\"\n        },\n        \"s1:slice_number\":
        {\n          \"type\": \"string\"\n        },\n        \"s1:total_slices\":
        {\n          \"type\": \"string\"\n        },\n        \"s1:processing_level\":
        {\n          \"type\": \"string\"\n        },\n        \"s1:shape\": {\n          \"type\":
        \"array\",\n          \"minItems\": 2,\n          \"items\": {\n            \"type\":
        \"integer\"\n          }\n        }\n      },\n      \"patternProperties\":
        {\n        \"^(?!s1:)\": {}\n      },\n      \"additionalProperties\": false\n
        \   }\n  }\n}\n"
    headers: {}
    status:
      code: 200
      message: OK
