name: Release

on:
  release:
    types:
      - published

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    if: ${{ github.repository }} == 'stac-utils/pystac'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: Determine package directory
        id: package
        run: |
          TAG="${{ github.event.release.tag_name }}"
          COMPONENT="${TAG%-v*}"
          case "$COMPONENT" in
            pystac-core)
              echo "directory=." >> "$GITHUB_OUTPUT"
              ;;
            pystac)
              echo "directory=meta" >> "$GITHUB_OUTPUT"
              ;;
            pystac-ext-*)
              EXT="${COMPONENT#pystac-ext-}"
              DIR="extensions/$(echo "$EXT" | sed 's/-/_/g')"
              echo "directory=$DIR" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown tag format: $TAG"
              exit 1
              ;;
          esac
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build
        run: python -m build ${{ steps.package.outputs.directory }}
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
